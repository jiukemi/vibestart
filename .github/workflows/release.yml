# 发版：push tag v* 或 Actions 手动 Run（可重打已有 tag，如 v0.1.0）
name: release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag，例如 v0.1.0"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }}

jobs:
  build-mac-arm:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build .dmg (aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-mac-intel:
    name: macOS Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build .dmg (x64)
        run: npm run tauri build -- --target x86_64-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64-dmg
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows x64 (NSIS)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build .exe (NSIS only)
        run: npm run tauri build -- --verbose --bundles nsis
        env:
          RUST_BACKTRACE: "1"

      - name: List bundle output
        shell: pwsh
        run: Get-ChildItem -Recurse src-tauri/target/release/bundle | Select-Object FullName

      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-exe
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: [build-mac-arm, build-mac-intel, build-windows]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      !cancelled() &&
      (
        needs.build-mac-arm.result == 'success' ||
        needs.build-mac-intel.result == 'success' ||
        needs.build-windows.result == 'success'
      )
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: VibeStart ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          body: |
            macOS（Apple Silicon / Intel）与 Windows x64 安装包。

            - **macOS**：`.dmg`（M 系列选 aarch64，Intel Mac 选 x64）
            - **Windows**：`.exe`（NSIS）

            未签名版本首次安装时系统可能提示安全警告，属正常现象。

            | 平台 | 状态 |
            |------|------|
            | macOS arm64 | ${{ needs.build-mac-arm.result }} |
            | macOS x64 | ${{ needs.build-mac-intel.result }} |
            | Windows x64 | ${{ needs.build-windows.result }} |
          files: release-assets/**/*
          fail_on_unmatched_files: false

  sync-gitee:
    name: Sync to Gitee Release
    needs: github-release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.github-release.result == 'success' &&
      github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          for i in $(seq 1 20); do
            COUNT=$(curl -sS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('assets') or []))" 2>/dev/null || echo 0)
            echo "GitHub Release 附件数: ${COUNT} (尝试 ${i}/20)"
            if [[ "$COUNT" -ge 1 ]]; then
              exit 0
            fi
            sleep 15
          done
          echo "警告: 未检测到附件，仍尝试同步"

      - name: Upload assets to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "${GITEE_TOKEN:-}" ]]; then
            echo "错误: 未配置 GITEE_TOKEN secret" >&2
            exit 1
          fi
          chmod +x scripts/sync-gitee-release.sh
          ./scripts/sync-gitee-release.sh "${{ env.RELEASE_TAG }}"
