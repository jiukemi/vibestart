<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App 预览 · 计数器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .phone {
      width: 280px;
      height: 520px;
      background: #fafafa;
      border-radius: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,.15);
      border: 8px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .appbar {
      background: #009688;
      color: #fff;
      padding: 40px 16px 14px;
      font-size: 18px;
      font-weight: 500;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    .count {
      font-size: 72px;
      font-weight: 300;
      color: #009688;
    }
    .buttons {
      display: flex;
      gap: 12px;
    }
    .buttons button {
      background: #009688;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 20px;
      font-size: 16px;
      min-width: 56px;
    }
    .buttons button.outline {
      background: transparent;
      color: #009688;
      border: 2px solid #009688;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #121212; }
      .phone { background: #1e1e1e; border-color: #555; }
      .count { color: #4db6ac; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="appbar">计数器</div>
    <div class="content">
      <div class="count">0</div>
      <div class="buttons">
        <button type="button">−</button>
        <button type="button" class="outline">重置</button>
        <button type="button">+</button>
      </div>
    </div>
  </div>
</body>
</html>
