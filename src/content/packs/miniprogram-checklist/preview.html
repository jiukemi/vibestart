<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小程序预览 · 待办清单</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ededed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }
    .phone {
      width: 320px;
      background: #f7f7f7;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      border: 1px solid #ddd;
    }
    .nav {
      background: #fff;
      padding: 44px 16px 12px;
      text-align: center;
      font-weight: 600;
      font-size: 17px;
      border-bottom: 1px solid #eee;
    }
    .body { padding: 16px; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .input-row input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .input-row button {
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 14px;
    }
    .todo {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .todo.done { opacity: .55; text-decoration: line-through; }
    .check {
      width: 20px; height: 20px;
      border: 2px solid #07c160;
      border-radius: 50%;
    }
    .hint {
      text-align: center;
      font-size: 11px;
      color: #888;
      padding: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .phone { background: #2c2c2c; border-color: #444; }
      .nav, .todo { background: #333; color: #eee; border-color: #444; }
      .input-row input { background: #333; color: #eee; border-color: #555; }
      .hint { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="nav">待办清单</div>
    <div class="body">
      <div class="input-row">
        <input placeholder="添加待办…" readonly />
        <button type="button">添加</button>
      </div>
      <div class="todo"><span class="check"></span> 学习 Vibe Coding</div>
      <div class="todo done"><span class="check"></span> 导入微信开发者工具</div>
      <div class="todo"><span class="check"></span> 用 AI 写第一个页面</div>
    </div>
    <p class="hint">模拟预览 · 真实效果请在微信开发者工具查看</p>
  </div>
</body>
</html>
