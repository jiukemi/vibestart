<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小游戏预览 · 点击得分</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ededed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }
    .phone {
      width: 320px;
      height: 568px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 24px 32px;
      color: #eaeaea;
    }
    .score { font-size: 22px; font-weight: 600; }
    .target {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: #07c160;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(7,193,96,.45);
      cursor: pointer;
      user-select: none;
    }
    .hint { font-size: 12px; opacity: .7; }
  </style>
</head>
<body>
  <div class="phone">
    <p class="score" id="score">得分：0</p>
    <button type="button" class="target" id="btn">点我加分</button>
    <p class="hint">预览仅为效果参考，请在微信开发者工具以小游戏模式运行</p>
  </div>
  <script>
    let n = 0;
    document.getElementById('btn').onclick = () => {
      n += 1;
      document.getElementById('score').textContent = '得分：' + n;
    };
  </script>
</body>
</html>
